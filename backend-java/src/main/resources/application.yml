server:
  port: 8080

spring:
  application:
    name: text2sql-backend
  datasource:
    url: jdbc:mysql://localhost:3306/NL2SQL?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: zw.5212623
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis:
  configuration:
    map-underscore-to-camel-case: true

text2sql:
  jwt-secret: text2sql-change-this-jwt-secret-before-deploy
  jwt-expire-minutes: 720
  crypto-secret: text2sql-change-this-crypto-secret
  ai-service-url: http://localhost:8000

logging:
  file:
    name: ${TEXT2SQL_LOG_DIR:logs}/text2sql-java.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} service=text2sql-java - %msg%n"
  logback:
    rollingpolicy:
      file-name-pattern: ${TEXT2SQL_LOG_DIR:logs}/text2sql-java.%d{yyyy-MM-dd}.%i.log
      max-file-size: 20MB
      max-history: 7
